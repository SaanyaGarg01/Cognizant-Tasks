# Configure web server port (default is 8080)
server.port=8080

# Logging levels for application and Spring Framework
logging.level.org.springframework=info
logging.level.com.cognizant=debug

# Custom console output log pattern
logging.pattern.console=%d{dd-MM-yy HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n
